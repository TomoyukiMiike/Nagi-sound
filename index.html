<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#040810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nagi">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Nagi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="bg-canvas"></canvas>

  <!-- ① Home: カテゴリ選択 -->
  <div id="home" class="screen active">
    <div class="home-header">
      <div class="home-logo">
        <svg class="logo-wave" viewBox="0 0 80 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wg" x1="0" y1="0" x2="80" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.3"/>
              <stop offset="50%"  stop-color="#c4b5fd" stop-opacity="1"/>
              <stop offset="100%" stop-color="#818cf8" stop-opacity="0.3"/>
            </linearGradient>
          </defs>
          <!-- background thin line -->
          <line x1="0" y1="14" x2="80" y2="14" stroke="url(#wg)" stroke-width="0.6" stroke-opacity="0.35"/>
          <!-- main wave -->
          <path d="M0,14 C6,14 8,4 14,4 C20,4 22,24 28,24 C34,24 36,4 42,4 C48,4 50,24 56,24 C62,24 64,4 70,4 C76,4 78,14 80,14"
                stroke="url(#wg)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- secondary wave (thinner, offset) -->
          <path d="M0,14 C6,14 8,9 14,9 C20,9 22,19 28,19 C34,19 36,9 42,9 C48,9 50,19 56,19 C62,19 64,9 70,9 C76,9 78,14 80,14"
                stroke="url(#wg)" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.40"/>
          <!-- center dot -->
          <circle cx="40" cy="4" r="3" fill="#c4b5fd" fill-opacity="0.85"/>
          <circle cx="40" cy="4" r="6" fill="#818cf8" fill-opacity="0.20"/>
        </svg>
      </div>
      <h1>Nagi</h1>
      <p class="home-sub-en">Sound Space for Your Mind</p>
      <p class="home-sub-jp">静寂と音が溶け合う場所</p>
    </div>
    <div class="category-list">
      <div class="category-card" data-cat="morning">
        <div class="card-content">
          <span class="card-icon">🌅</span>
          <div class="card-text"><h2>朝の目覚め</h2><p>α→β波でやさしく覚醒</p></div>
          <span class="card-arrow">›</span>
        </div>
      </div>
      <div class="category-card" data-cat="ready">
        <div class="card-content">
          <span class="card-icon">☀️</span>
          <div class="card-text"><h2>朝の支度</h2><p>β波でテンションアップ</p></div>
          <span class="card-arrow">›</span>
        </div>
      </div>
      <div class="category-card" data-cat="focus">
        <div class="card-content">
          <span class="card-icon">✨</span>
          <div class="card-text"><h2>集中</h2><p>α波でフロー状態へ</p></div>
          <span class="card-arrow">›</span>
        </div>
      </div>
      <div class="category-card" data-cat="meditation">
        <div class="card-content">
          <span class="card-icon">🌸</span>
          <div class="card-text"><h2>瞑想</h2><p>θ波で深い瞑想状態へ</p></div>
          <span class="card-arrow">›</span>
        </div>
      </div>
      <div class="category-card" data-cat="sleep">
        <div class="card-content">
          <span class="card-icon">🌙</span>
          <div class="card-text"><h2>睡眠</h2><p>δ波で深い眠りへ</p></div>
          <span class="card-arrow">›</span>
        </div>
      </div>
    </div>
    <p class="headphone-tip">🎧 ヘッドフォン推奨 — バイノーラルビートは両耳で体験できます</p>
  </div>

  <!-- ② Mood: 気分・状況選択 -->
  <div id="mood" class="screen">
    <div class="mood-top">
      <button id="btn-mood-back" class="icon-btn" aria-label="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <div class="mood-top-text">
        <h2 id="mood-cat-title"></h2>
        <p>今の状況を選んでください</p>
      </div>
    </div>
    <div class="mood-list" id="mood-list"></div>
  </div>

  <!-- ③ Player: 再生画面 -->
  <div id="player" class="screen">
    <canvas id="canvas"></canvas>
    <div class="player-overlay">

      <div class="player-top">
        <button id="btn-back" class="icon-btn" aria-label="戻る">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
          </svg>
        </button>
        <div class="player-title">
          <h2 id="player-name"></h2>
          <p id="player-desc"></p>
        </div>
        <div id="timer-display" class="timer-display">--:--</div>
      </div>

      <div class="player-bottom">
        <div class="panel layers-panel">
          <div class="panel-label">音のレイヤー</div>
          <div id="layers-container"></div>
        </div>
        <div class="panel main-panel">
          <div class="control-row">
            <span class="control-label">音量</span>
            <input type="range" id="master-vol" class="slider" min="0" max="100" value="70">
          </div>
          <div class="control-row">
            <span class="control-label">タイマー</span>
            <div class="timer-btns">
              <!-- populated dynamically by _renderTimerBtns(cat) -->
            </div>
          </div>
          <button id="btn-play" class="play-btn">
            <span id="play-icon">▶</span>
            <span id="play-text">再生</span>
          </button>
        </div>
      </div>

    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
