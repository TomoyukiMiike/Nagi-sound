<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#040810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nagi">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Nagi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="bg-canvas"></canvas>

  <div id="main" class="screen active">

    <!-- ① Top bar: brand + timer -->
    <div class="top-bar">
      <div class="brand">
        <svg class="brand-wave" viewBox="0 0 48 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bwg" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.5"/>
              <stop offset="50%"  stop-color="#f0abfc" stop-opacity="1"/>
              <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.5"/>
            </linearGradient>
          </defs>
          <path d="M0,8 C6,8 7,2 12,2 C17,2 18,14 24,14 C30,14 31,2 36,2 C41,2 42,8 48,8"
                stroke="url(#bwg)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="14" r="2" fill="#f0abfc" fill-opacity="0.80"/>
        </svg>
        <span class="brand-name">Nagi</span>
        <span class="brand-kanji">凪</span>
      </div>
      <div id="timer-display" class="timer-display">--:--</div>
    </div>

    <!-- ② Mode rail: 5 category tabs -->
    <div class="mode-rail" role="tablist">
      <button class="mode-tab" data-cat="morning"    role="tab" aria-selected="false">
        <span class="mode-tab-icon">🌅</span>
        <span class="mode-tab-label">朝の目覚め</span>
      </button>
      <button class="mode-tab" data-cat="relax"      role="tab" aria-selected="false">
        <span class="mode-tab-icon">🌿</span>
        <span class="mode-tab-label">リラックス</span>
      </button>
      <button class="mode-tab" data-cat="walk" role="tab" aria-selected="false">
        <span class="mode-tab-icon">🚶</span>
        <span class="mode-tab-label">散歩</span>
      </button>
      <button class="mode-tab" data-cat="focus"      role="tab" aria-selected="false">
        <span class="mode-tab-icon">✨</span>
        <span class="mode-tab-label">集中</span>
      </button>
      <button class="mode-tab" data-cat="meditation" role="tab" aria-selected="false">
        <span class="mode-tab-icon">🌸</span>
        <span class="mode-tab-label">瞑想</span>
      </button>
      <button class="mode-tab" data-cat="presleep"   role="tab" aria-selected="false">
        <span class="mode-tab-icon">🛁</span>
        <span class="mode-tab-label">睡眠前</span>
      </button>
      <button class="mode-tab" data-cat="sleep"      role="tab" aria-selected="false">
        <span class="mode-tab-icon">🌙</span>
        <span class="mode-tab-label">睡眠</span>
      </button>
    </div>

    <!-- ③ Ambient visual canvas -->
    <div class="vis-wrap">
      <canvas id="canvas"></canvas>
      <div class="vis-overlay">
        <p id="mode-sub" class="mode-sub"></p>
      </div>
      <!-- Breath guide overlay -->
      <div id="breath-guide" class="breath-guide">
        <div id="breath-ring" class="breath-ring"></div>
        <p id="breath-text" class="breath-text">息を吸って</p>
        <p id="breath-count" class="breath-count">あと 5 回</p>
      </div>
      <!-- Journey phase badge -->
      <div id="journey-phase-badge" class="journey-phase-badge hidden"></div>
    </div>

    <!-- ④ Situation chips -->
    <div class="sit-rail" id="sit-rail" role="tablist"></div>

    <!-- Preset selector -->
    <div id="preset-row" class="preset-row"></div>

    <!-- ⑤ Layer sliders -->
    <div class="layer-panel">
      <div id="layers-container"></div>
    </div>

    <!-- Sleep extras (journey + breath, shown only in sleep mode) -->
    <div id="sleep-extras" class="sleep-extras hidden">
      <button id="journey-btn" class="sleep-extra-btn">
        <span class="sleep-extra-icon">🌙</span>
        <span class="sleep-extra-label">スリープジャーニー</span>
      </button>
      <button id="breath-btn" class="sleep-extra-btn">
        <span class="sleep-extra-icon">🫁</span>
        <span class="sleep-extra-label">呼吸ガイド</span>
      </button>
    </div>

    <!-- ⑥ Controls: volume + timer + play -->
    <div class="ctrl-bar">
      <div class="ctrl-vol">
        <svg class="vol-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7H7L11 3v14l-4-4H3V7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M14 6.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <input type="range" id="master-vol" class="slider" min="0" max="100" value="70">
      </div>
      <div class="ctrl-actions">
        <div class="timer-btns"></div>
        <button id="btn-play" class="play-btn">
          <span id="play-icon">▶</span>
          <span id="play-text">再生</span>
        </button>
      </div>
    </div>

    <p class="hp-tip">🎧 ヘッドフォン推奨 — バイノーラルビートは両耳で体験できます</p>

  </div>

  <!-- ── 凪 Music ────────────────────────────────────────────────────────── -->
  <div id="music-screen">
    <div class="ms-topbar">
      <button class="ms-back-btn" id="ms-back-btn" aria-label="ヒーリングに戻る">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M14 5L8 11l6 6" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="ms-brand">凪 Music</span>
      <div class="ms-top-controls">
        <button class="ms-playpause-btn" id="ms-playpause-btn" aria-label="停止">
          <!-- icon injected by JS -->
          <svg class="ms-pp-icon" id="ms-pp-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect x="3" y="2" width="3.5" height="12" rx="1.2"/>
            <rect x="9.5" y="2" width="3.5" height="12" rx="1.2"/>
          </svg>
        </button>
        <button class="ms-skip-btn" id="ms-skip-btn" aria-label="次のトラックへ">次へ ›</button>
      </div>
    </div>
    <!-- Situation tab rail (populated by NagiMusic._renderTabs()) -->
    <div id="ms-track-rail" class="ms-track-rail" role="tablist"></div>

    <canvas id="ms-canvas" class="ms-canvas"></canvas>

    <div class="ms-center">
      <div class="ms-track-icon" id="ms-track-icon">☕</div>
      <h2 class="ms-track-name" id="ms-track-name">Café Morning</h2>
      <p  class="ms-track-sub"  id="ms-track-sub">コーヒーを飲みながら、朝をゆっくり過ごす</p>
      <div class="ms-progress-wrap">
        <div class="ms-progress-fill" id="ms-progress-fill"></div>
      </div>
    </div>

    <div class="ms-vol-row">
      <svg class="vol-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 7H7L11 3v14l-4-4H3V7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M14 6.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="range" id="ms-vol" class="slider" min="0" max="100" value="70">
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
